<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title -->
    <title>Github Issue Tracker</title>

    <!-- Font-Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body class="">
    <div class="logo w-lg mx-auto bg-[#F8FAFC] shadow-sm my-10 rounded-md">
        <div class="flex justify-center">
            <img class="my-7" src="./assets/github-logo.png" alt="">
        </div>

        <div class="text-center space-y-1">
            <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>

        <div class="card w-full max-w-sm shrink-0 mx-auto">
            <div class="card-body">
                <label class="label text-neutral font-bold">Username</label>
                <input id="input-username" type="text" class="input rounded-md bg-base-200"
                    placeholder="Enter Username" />
                <p class="text-[#4A00FF]">Default: admin</p>
                <br>
                <label class="label text-neutral font-bold">Password</label>
                <input id="input-password" type="text" class="input rounded-md bg-base-200"
                    placeholder="Enter Your Password" />
                <p class="text-[#4A00FF]">Default: admin123</p>
                <!-- <div><a class="link link-hover">Forgot password?</a></div> -->
                <button onclick="location.href='home.html'" id="sign-in-btn" class="btn btn-primary mt-4 rounded-md">Sign In</button>
            </div>
        </div>

        <div class="text-center">
            <div class="text-[#64748B]">
                <span>-----------------OR-----------------</span>
            </div>
            <div class="text-[#64748B] mt-6">Demo Credential:</div>
            <div class="py-9">
                <strong>Username:</strong> admin <br>
                <strong>Password:</strong> admin123
            </div>
        </div>
    </div>

    <script src="./script/sign-in.js"></script>
</body>

</html>
